<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>css-syntax playground</title>
    <style>
      * {
        margin: 0;
        box-sizing: border-box;
      }
      body {
        font-family: monospace;
        height: 100vh;
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto 1fr 1fr;
      }
      header {
        grid-column: 1 / -1;
        padding: 0.5rem 1rem;
        background: #1a1a2e;
        font-size: 1rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      header a {
        color: #eee;
        text-decoration: none;
      }
      .tabs {
        display: flex;
        gap: 0.5rem;
      }
      .tab {
        padding: 0.25rem 0.75rem;
        background: #16213e;
        color: #eee;
        border: none;
        cursor: pointer;
        font-family: monospace;
        font-size: 0.85rem;
      }
      .tab.active {
        background: #0f3460;
      }
      textarea,
      .output {
        grid-column: 1;
        padding: 1rem;
        border: none;
        border-right: 1px solid #333;
        outline: none;
        resize: none;
        font-family: monospace;
        font-size: 0.9rem;
      }
      textarea {
        background: #1e1e1e;
        color: #d4d4d4;
        border-bottom: 1px solid #333;
      }
      .output {
        background: #1a1a2e;
        color: #eee;
        white-space: pre-wrap;
        word-break: break-word;
        overflow: auto;
      }
      #print {
        border-right: 1px solid #333;
      }
      .label {
        background: #0f3460;
        color: #eee;
        padding: 0.25rem 0.5rem;
        font-size: 0.75rem;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <header>
      <a href="https://github.com/css-in-ts-compiler/css-syntax">css-syntax playground</a>
      <div class="tabs">
        <button class="tab active" data-mode="lex">Lex</button>
        <button class="tab" data-mode="parse">Parse</button>
        <button class="tab" data-mode="print">Print</button>
      </div>
    </header>
    
    <textarea id="input" spellcheck="false">.foo {
  color: red;
  padding: 10px 20px;
}

@media (min-width: 768px) {
  .foo {
    font-size: 16px;
  }
}</textarea>
    
    <div class="label">Tokens / AST</div>
    <div class="output" id="parse"></div>
    
    <div class="label">Output</div>
    <div class="output" id="print"></div>
    
    <script type="module">
      const _input = document.getElementById("input");
      const _parse = document.getElementById("parse");
      const _print = document.getElementById("print");
      const tabs = document.querySelectorAll(".tab");
      
      let mode = "lex";
      
      const encode = (s) => s
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
      
      const formatToken = (t) => {
        const names = [
          "EOF", "Ident", "Function", "AtKeyword", "Hash", "String", "Url", 
          "Number", "Dimension", "Percentage", "UnicodeRange", "Comma", "Colon", 
          "Semicolon", "Slash", "Asterisk", "Plus", "Minus", "Dollar", "Tilde",
          "Caret", "At", "LeftBracket", "RightBracket", "LeftParen", "RightParen",
          "LeftBrace", "RightBrace", "DoubleBar", "DoubleAmp", "Bar", "QuestionMark",
          "ExclamationMark", "HashMark", "Whitespace", "Comment", "CDOToken", "CDCToken",
          "BadString", "BadUrl", "Delim"
        ];
        return `${names[t.token] || t.token}: ${encode(t.value)}`;
      };
      
      const update = () => {
        try {
          const src = _input.value;
          
          if (mode === "lex") {
            // Lex mode - show tokens
            const tokens = lexAll(src);
            _parse.textContent = tokens.map(formatToken).join("\n");
            _print.textContent = `Total: ${tokens.length} tokens`;
          } else if (mode === "parse") {
            // Parse mode - show AST
            const ast = parseValue(src);
            _parse.textContent = JSON.stringify(ast, null, 2);
            _print.textContent = "";
          } else {
            // Print mode
            const ast = parseValue(src);
            const output = print(ast);
            _parse.textContent = JSON.stringify(ast, null, 2);
            _print.textContent = output;
          }
        } catch (e) {
          _parse.textContent = e.message;
          _print.textContent = e.stack;
        }
      };
      
      // Simple lexer implementation for demo
      const Token = {
        EOF: 0, Ident: 1, Function: 2, AtKeyword: 3, Hash: 4, String: 5, Url: 6,
        Number: 7, Dimension: 8, Percentage: 9, Comma: 11, Colon: 12, Semicolon: 13,
        Slash: 14, Asterisk: 15, Plus: 16, Minus: 17, LeftBrace: 26, RightBrace: 27,
        Whitespace: 34, Comment: 35, Delim: 40,
      };
      
      const lexAll = (source) => {
        const tokens = [];
        let i = 0;
        
        while (i < source.length) {
          const code = source.charCodeAt(i);
          
          // Whitespace
          if (code === 32 || code === 9 || code === 10 || code === 13) {
            let ws = "";
            while (i < source.length) {
              const c = source.charCodeAt(i);
              if (c === 32 || c === 9 || c === 10 || c === 13) {
                ws += source[i];
                i++;
              } else break;
            }
            tokens.push({ token: Token.Whitespace, value: ws, pos: i - ws.length, end: i });
            continue;
          }
          
          // String
          if (code === 34 || code === 39) {
            const quote = source[i];
            let j = i + 1;
            while (j < source.length) {
              if (source[j] === quote && source[j-1] !== "\\") break;
              j++;
            }
            const value = source.slice(i, j + 1);
            tokens.push({ token: Token.String, value, pos: i, end: j + 1 });
            i = j + 1;
            continue;
          }
          
          // Number or Dimension
          if (code >= 48 && code <= 57 || (code === 46 && i + 1 < source.length && source.charCodeAt(i + 1) >= 48 && source.charCodeAt(i + 1) <= 57)) {
            let j = i;
            while (j < source.length && ((source.charCodeAt(j) >= 48 && source.charCodeAt(j) <= 57) || source.charCodeAt(j) === 46)) j++;
            let value = source.slice(i, j);
            
            // Check for dimension
            while (j < source.length && /[a-zA-Z-]/.test(source[j])) j++;
            if (j > i + value.length) {
              tokens.push({ token: Token.Dimension, value: source.slice(i, j), pos: i, end: j });
            } else if (value.includes(".")) {
              tokens.push({ token: Token.Number, value, pos: i, end: j });
            } else {
              tokens.push({ token: Token.Number, value, pos: i, end: j });
            }
            i = j;
            continue;
          }
          
          // Ident
          if ((code >= 65 && code <= 90) || (code >= 97 && code <= 122) || code === 95) {
            let j = i;
            while (j < source.length && /[a-zA-Z0-9_-]/.test(source[j])) j++;
            const value = source.slice(i, j);
            
            if (source[j] === "(") {
              tokens.push({ token: Token.Function, value, pos: i, end: j + 1 });
              i = j + 1;
            } else {
              tokens.push({ token: Token.Ident, value, pos: i, end: j });
              i = j;
            }
            continue;
          }
          
          // Single char tokens
          const char = source[i];
          const tokenMap = {
            "{": Token.LeftBrace,
            "}": Token.RightBrace,
            ";": Token.Semicolon,
            ":": Token.Colon,
            ",": Token.Comma,
            "/": Token.Slash,
            "*": Token.Asterisk,
            "+": Token.Plus,
            "-": Token.Minus,
          };
          
          if (tokenMap[char]) {
            tokens.push({ token: tokenMap[char], value: char, pos: i, end: i + 1 });
            i++;
            continue;
          }
          
          // Delim
          tokens.push({ token: Token.Delim, value: char, pos: i, end: i + 1 });
          i++;
        }
        
        tokens.push({ token: Token.EOF, value: "", pos: i, end: i });
        return tokens;
      };
      
      // Simple value parser
      const parseValue = (source) => {
        const tokens = lexAll(source);
        const nodes = [];
        let i = 0;
        
        const peek = () => tokens[i];
        const consume = () => tokens[i++];
        
        while (i < tokens.length) {
          const t = peek();
          if (t.token === Token.EOF) break;
          
          if (t.token === Token.Whitespace) {
            consume();
            continue;
          }
          
          if (t.token === Token.Number) {
            nodes.push({ type: "number", value: t.value, number: parseFloat(t.value) });
            consume();
            continue;
          }
          
          if (t.token === Token.Dimension) {
            const match = t.value.match(/^(-?\d+\.?\d*)(.*)$/);
            nodes.push({ type: "dimension", value: t.value, number: parseFloat(match[1]), unit: match[2] });
            consume();
            continue;
          }
          
          if (t.token === Token.Ident || t.token === Token.Function) {
            const name = t.value;
            if (t.token === Token.Function) {
              consume();
              const args = [];
              while (peek().token !== Token.RightBrace && peek().token !== Token.EOF) {
                const arg = consume();
                if (arg.token !== Token.Whitespace) args.push({ type: "keyword", value: arg.value });
              }
              if (peek().token === Token.RightBrace) consume();
              nodes.push({ type: "function", name, args });
            } else {
              nodes.push({ type: "keyword", value: name });
              consume();
            }
            continue;
          }
          
          if (t.token === Token.String) {
            nodes.push({ type: "string", value: t.value.slice(1, -1) });
            consume();
            continue;
          }
          
          consume();
        }
        
        return nodes;
      };
      
      // Simple printer
      const print = (nodes) => {
        return nodes.map(n => {
          switch (n.type) {
            case "number": return n.value;
            case "dimension": return n.value;
            case "string": return `"${n.value}"`;
            case "function": return `${n.name}(${n.args.map(a => a.value).join(" ")})`;
            default: return n.value;
          }
        }).join(" ");
      };
      
      tabs.forEach(tab => {
        tab.onclick = () => {
          tabs.forEach(t => t.classList.remove("active"));
          tab.classList.add("active");
          mode = tab.dataset.mode;
          update();
        };
      });
      
      _input.oninput = update;
      update();
    </script>
  </body>
</html>
